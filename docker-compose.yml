version: "3.8"
services:
  bindery:
    build: .
    container_name: bindery
    ports:
      - "8580:3000"
    volumes:
      - /volume1/Manga:/library
    environment:
      - DATA_DIR=/library/.comic-reader
      - LIBRARY_DIR=/library
      - SERVER_PORT=3000
      - NODE_ENV=production
      - OCR_SERVICE_URL=http://import-orchestrator:3001
      # Synology DSM API for user authentication
      # Points to DSM running on the NAS (host.docker.internal = NAS host)
      - DSM_URL=http://host.docker.internal:5000
      # First user to log in gets all existing comics in their collection
      - DEFAULT_USER=local
      # Set to your admin username for admin privileges
      - ADMIN_USER=jammo
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - import-orchestrator
    restart: unless-stopped

  import-orchestrator:
    build: ./ocr-service
    container_name: import-orchestrator
    volumes:
      - /volume1/Manga:/library
    environment:
      - DATA_DIR=/library/.comic-reader
      - SERVER_PORT=3001
    restart: unless-stopped
