version: "3.8"
services:
  comic-reader:
    image: comic-reader:latest
    container_name: comic-reader
    ports:
      - "8580:3000"
    volumes:
      - /volume1/Manga:/library
    environment:
      - DATA_DIR=/library/.comic-reader
      - LIBRARY_DIR=/library
      - SERVER_PORT=3000
      - OCR_SERVICE_URL=http://ocr-service:3001
    depends_on:
      - ocr-service
    restart: unless-stopped

  ocr-service:
    image: ocr-service:latest
    container_name: ocr-service
    volumes:
      - /volume1/Manga:/library
    environment:
      - DATA_DIR=/library/.comic-reader
      - SERVER_PORT=3001
    restart: unless-stopped
