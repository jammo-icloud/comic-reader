version: "3.8"
services:
  comic-reader:
    build: .
    container_name: comic-reader
    ports:
      - "8580:3000"
    volumes:
      - comic-reader-data:/app/data
      - /volume1/Manga:/mnt/manga:ro
      # Add more shelves here:
      # - /volume1/Magazines:/mnt/magazines:ro
      # - /volume1/Adult:/mnt/adult:ro
    environment:
      - DATA_DIR=/app/data
      - SERVER_PORT=3000
    restart: unless-stopped

volumes:
  comic-reader-data:
