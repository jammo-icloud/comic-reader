version: "3.8"
services:
  comic-reader:
    build: .
    container_name: comic-reader
    ports:
      - "8580:3000"
    volumes:
      - /volume1/Manga:/library
    environment:
      - DATA_DIR=/library/.comic-reader
      - LIBRARY_DIR=/library
      - SERVER_PORT=3000
      - OCR_SERVICE_URL=http://import-orchestrator:3001
    depends_on:
      - import-orchestrator
    restart: unless-stopped

  import-orchestrator:
    build: ./ocr-service
    container_name: import-orchestrator
    volumes:
      - /volume1/Manga:/library
    environment:
      - DATA_DIR=/library/.comic-reader
      - SERVER_PORT=3001
    restart: unless-stopped
