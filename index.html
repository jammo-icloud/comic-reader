<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />

    <!-- viewport-fit=cover is REQUIRED for env(safe-area-inset-*) to return real
         values on iPhone notch/Dynamic Island devices. Without it, every safe-area
         calc in CSS resolves to 0 and floating buttons sit under the status bar. -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no"
    />

    <!-- iOS standalone PWA: hide Safari chrome on home-screen launch.
         apple-mobile-web-app-capable is iOS-specific; mobile-web-app-capable is
         the modern cross-platform replacement (Chrome, Edge, etc.). Ship both. -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- black-translucent: status bar text rides on top of our sticky headers
         (which have backdrop-blur). Page content extends behind it; safe-area-inset-top
         pushes interactive content down to clear the time/battery. -->
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

    <!-- Home-screen label. Short — iOS truncates long titles. -->
    <meta name="apple-mobile-web-app-title" content="Bindery" />

    <!-- Don't auto-link phone numbers in synopsis text etc. -->
    <meta name="format-detection" content="telephone=no" />

    <!-- theme-color drives the iOS standalone status-bar fill (when not translucent)
         AND the Android Chrome address bar tint. We set sensible defaults for first
         paint; lib/themes.ts updates this dynamically when the theme changes.
         Two media-query variants give the best first-paint before JS runs. -->
    <meta name="theme-color" content="#030712" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#f9fafb" media="(prefers-color-scheme: light)" />

    <!-- Favicons -->
    <link rel="icon" type="image/png" href="/logo.png" />

    <!-- iOS home-screen icon. iOS prefers 180×180 explicitly. -->
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/apple-touch-icon-180.png" />

    <!-- iOS standalone PWA splash screens.
         iOS picks via device-resolution media queries; nearest match wins for
         devices not listed. Generated by scripts/generate-splash.ts from
         public/login-bg/ (re-run after swapping art). -->
    <link
      rel="apple-touch-startup-image"
      media="(device-width: 430px) and (device-height: 932px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)"
      href="/splash/splash-1290x2796.png"
    />
    <link
      rel="apple-touch-startup-image"
      media="(device-width: 393px) and (device-height: 852px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)"
      href="/splash/splash-1179x2556.png"
    />
    <link
      rel="apple-touch-startup-image"
      media="(device-width: 390px) and (device-height: 844px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)"
      href="/splash/splash-1170x2532.png"
    />
    <link
      rel="apple-touch-startup-image"
      media="(device-width: 375px) and (device-height: 667px) and (-webkit-device-pixel-ratio: 2) and (orientation: portrait)"
      href="/splash/splash-750x1334.png"
    />

    <title>Bindery</title>
  </head>
  <body class="bg-gray-50 text-gray-900 dark:bg-gray-950 dark:text-gray-100 transition-colors">
    <div id="root"></div>
    <script type="module" src="/src/client/main.tsx"></script>
  </body>
</html>
